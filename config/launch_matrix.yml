    - name: sign_in_light
      role: guest
      theme: light
      path: /login
      expect:
        final_path: /login
        contains_text:
          - Sign in to your workspace
          - Continue with Google
          - Continue with GitHub
        min_buttons: 8
        min_inputs: 2
    - name: sign_in_dark
      role: guest
      theme: dark
      path: /login
      expect:
        final_path: /login
        contains_text:
          - Sign in to your workspace
          - Continue with Google
          - Continue with GitHub
        min_buttons: 8
        min_inputs: 2
    - name: sign_up_dark
