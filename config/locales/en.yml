      confirmation:
        body_intro: 'You''re almost set. Here are a few of the things you can do with
          Miru from day one:'
        cta: Confirm email address
        cta_body: Use the button below to confirm your email address.
        eyebrow: Account setup
        feature_1: Send professional invoices with hosted payment links.
        feature_2: Track time, expenses, and utilization in one workflow.
        feature_3: Manage your team, clients, and billing from a single workspace.
        feature_4: Stay on top of revenue, overdue invoices, and payment activity.
        footer_note: If you did not create a Miru account, you can safely ignore this
          message.
        greeting_html: Hi <strong>%{name}</strong>,
        preheader: Confirm your email address to finish setting up Miru.
        subtitle: Confirm your email address to start tracking time, sending invoices,
          and managing your team from one place.
        title: Welcome to Miru
      email_changed:
        changed_html: Your account email has been changed to <strong>%{email}</strong>.
        eyebrow: Account security
        greeting_html: Hello <strong>%{email}</strong>,
        pending_html: Your account email is being changed to <strong>%{email}</strong>.
        preheader: Your Miru email address has changed.
        subtitle: This message confirms a change to the email address on your Miru
          account.
        title: Email address updated
        warning_body_html: Contact our support team immediately at <a href="mailto:%{email}">%{email}</a>.
        warning_title: Did not request this change?
      password_change:
        eyebrow: Account security
        greeting_html: Hello <strong>%{name}</strong>,
        preheader: Your Miru password has been changed.
        subtitle: Your Miru account password was updated successfully.
        success_body: You can continue signing in to Miru using your new password.
        success_title: Your password was updated.
        title: Password changed successfully
        warning_body_html: Contact <a href="mailto:%{email}">%{email}</a> right away
          so we can help secure your account.
        warning_title: Did not make this change?
      reset_password:
        cta: Reset password
        cta_body: Use the button below to choose a new password. This reset link expires
          in 24 hours.
        eyebrow: Account security
        footer_note: If you did not request a password reset, you can ignore this
          message and your password will stay the same.
        greeting: Hello,
        preheader: Reset the password for your Miru account.
        request_html: We received a request to change the password associated with
          <strong>%{email}</strong>.
        subtitle: We received a request to reset the password for your Miru account.
        title: Reset your password
      shared:
        signature_html: Thanks,<br><strong>Team Miru</strong>
      unlock:
        cta: Reset password
        eyebrow: Account security
        footer_note: If you did not try to sign in, wait for the lock to expire and
          change your password immediately.
        greeting_html: Hello <strong>%{email}</strong>,
        preheader: Unlock your Miru account after too many failed sign-in attempts.
        subtitle: We locked your Miru account after too many unsuccessful sign-in
          attempts.
        title: Your account is temporarily locked
        warning_body: Miru unlocks accounts automatically after 30 minutes. If you
          do not recognize these attempts, reset your password so your account is
          secure once the lock expires.
        warning_title: Sign-in attempts exceeded the allowed limit.
