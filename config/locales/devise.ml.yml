        subject: നിങ്ങളുടെ മിരു പാസ്‌വേഡ് പുനഃസജ്ജമാക്കുക
      unlock_instructions:
        subject: അൺലോക്ക് നിർദ്ദേശങ്ങൾ
    omniauth_callbacks:
      failure: '"%{reason}" ആയതിനാൽ %{kind} ൽ നിന്ന് നിങ്ങളെ പ്രാമാണീകരിക്കാൻ കഴിഞ്ഞില്ല.'
      success: "%{kind} അക്കൗണ്ടിൽ നിന്ന് വിജയകരമായി പ്രാമാണീകരിച്ചു."
    passwords:
      no_token: പാസ്‌വേഡ് റീസെറ്റ് ഇമെയിലിൽ നിന്ന് വരാതെ നിങ്ങൾക്ക് ഈ പേജ് ആക്‌സസ്
        ചെയ്യാൻ കഴിയില്ല. പാസ്‌വേഡ് റീസെറ്റ് ഇമെയിലിൽ നിന്നാണ് വരുന്നതെങ്കിൽ, നൽകിയിരിക്കുന്ന
        പൂർണ്ണ URL ആണ് നിങ്ങൾ ഉപയോഗിച്ചതെന്ന് ഉറപ്പാക്കുക.
      send_instructions: നിങ്ങളുടെ പാസ്‌വേഡ് എങ്ങനെ പുനഃസജ്ജമാക്കാം എന്നതിനെക്കുറിച്ചുള്ള
        നിർദ്ദേശങ്ങളുള്ള ഒരു ഇമെയിൽ കുറച്ച് മിനിറ്റുകൾക്കുള്ളിൽ നിങ്ങൾക്ക് ലഭിക്കും.
      send_paranoid_instructions: നിങ്ങളുടെ ഇമെയിൽ വിലാസം ഞങ്ങളുടെ ഡാറ്റാബേസിൽ നിലവിലുണ്ടെങ്കിൽ,
        കുറച്ച് മിനിറ്റുകൾക്കുള്ളിൽ നിങ്ങളുടെ ഇമെയിൽ വിലാസത്തിൽ ഒരു പാസ്‌വേഡ് വീണ്ടെടുക്കൽ
        ലിങ്ക് ലഭിക്കും.
      updated: നിങ്ങളുടെ പാസ്‌വേഡ് വിജയകരമായി മാറ്റി. നിങ്ങൾ ഇപ്പോൾ സൈൻ ഇൻ ചെയ്‌തു.
      updated_not_active: നിങ്ങളുടെ പാസ്‌വേഡ് വിജയകരമായി മാറ്റി.
    registrations:
      destroyed: ബൈ! നിങ്ങളുടെ അക്കൗണ്ട് വിജയകരമായി റദ്ദാക്കി. നിങ്ങളെ വീണ്ടും കാണുമെന്ന്
        ഞങ്ങൾ പ്രതീക്ഷിക്കുന്നു.
      signed_up: സ്വാഗതം! നിങ്ങൾ വിജയകരമായി സൈൻ അപ്പ് ചെയ്തു.
      signed_up_but_inactive: നിങ്ങൾ വിജയകരമായി സൈൻ അപ്പ് ചെയ്തു. എന്നിരുന്നാലും,
        നിങ്ങളുടെ അക്കൗണ്ട് ഇതുവരെ സജീവമാക്കിയിട്ടില്ലാത്തതിനാൽ ഞങ്ങൾക്ക് നിങ്ങളെ
        സൈൻ ഇൻ ചെയ്യാൻ കഴിഞ്ഞില്ല.
      signed_up_but_locked: നിങ്ങൾ വിജയകരമായി സൈൻ അപ്പ് ചെയ്‌തു. എന്നിരുന്നാലും, നിങ്ങളുടെ
        അക്കൗണ്ട് ലോക്ക് ചെയ്‌തിരിക്കുന്നതിനാൽ ഞങ്ങൾക്ക് നിങ്ങളെ സൈൻ ഇൻ ചെയ്യാൻ കഴിഞ്ഞില്ല.
      signed_up_but_unconfirmed: ''
      update_needs_confirmation: നിങ്ങളുടെ അക്കൗണ്ട് വിജയകരമായി അപ്ഡേറ്റ് ചെയ്തു,
        പക്ഷേ ഞങ്ങൾക്ക് നിങ്ങളുടെ പുതിയ ഇമെയിൽ വിലാസം പരിശോധിക്കേണ്ടതുണ്ട്. നിങ്ങളുടെ
        ഇമെയിൽ പരിശോധിച്ച് പുതിയ ഇമെയിൽ വിലാസം സ്ഥിരീകരിക്കുന്നതിന് സ്ഥിരീകരണ ലിങ്ക്
        പിന്തുടരുക.
      updated: മാറ്റങ്ങൾ വിജയകരമായി സംരക്ഷിച്ചു.
      updated_but_not_signed_in: നിങ്ങളുടെ അക്കൗണ്ട് വിജയകരമായി അപ്ഡേറ്റ് ചെയ്തു,
        പക്ഷേ നിങ്ങളുടെ പാസ്‌വേഡ് മാറ്റിയതിനാൽ, നിങ്ങൾ വീണ്ടും സൈൻ ഇൻ ചെയ്യേണ്ടതുണ്ട്.
      user:
        signed_up_but_Your access has been disabled: നിങ്ങളുടെ ഇമെയിൽ വിലാസം സ്ഥിരീകരിക്കുന്നതിന്
          ദയവായി നിങ്ങളുടെ ഇമെയിൽ പരിശോധിച്ച് സ്ഥിരീകരണ ലിങ്ക് പിന്തുടരുക.
    sessions:
      already_signed_out: വിജയകരമായി സൈൻ ഔട്ട് ചെയ്‌തു.
      signed_in: വിജയകരമായി സൈൻ ഇൻ ചെയ്‌തു.
      signed_out: വിജയകരമായി സൈൻ ഔട്ട് ചെയ്‌തു.
      warn_pwned: നിങ്ങളുടെ പാസ്‌വേഡ് അറിയപ്പെടുന്ന ഡാറ്റാ ലംഘനങ്ങളിൽ പ്രത്യക്ഷപ്പെട്ടിട്ടുണ്ട്.
        ദയവായി അത് ഉടൻ മാറ്റുക.
    unlocks:
      new:
        submit: അൺലോക്ക് നിർദ്ദേശങ്ങൾ വീണ്ടും അയയ്ക്കുക
        title: അൺലോക്ക് നിർദ്ദേശങ്ങൾ വീണ്ടും അയയ്ക്കുക
      send_instructions: കുറച്ച് മിനിറ്റുകൾക്കുള്ളിൽ നിങ്ങളുടെ അക്കൗണ്ട് എങ്ങനെ അൺലോക്ക്
        ചെയ്യാമെന്നതിനുള്ള നിർദ്ദേശങ്ങളുള്ള ഒരു ഇമെയിൽ നിങ്ങൾക്ക് ലഭിക്കും.
      send_paranoid_instructions: നിങ്ങളുടെ അക്കൗണ്ട് നിലവിലുണ്ടെങ്കിൽ, കുറച്ച് മിനിറ്റുകൾക്കുള്ളിൽ
        അത് എങ്ങനെ അൺലോക്ക് ചെയ്യാമെന്നതിനുള്ള നിർദ്ദേശങ്ങളുള്ള ഒരു ഇമെയിൽ നിങ്ങൾക്ക്
        ലഭിക്കും.
      unlocked: നിങ്ങളുടെ അക്കൗണ്ട് വിജയകരമായി അൺലോക്ക് ചെയ്‌തു. തുടരാൻ സൈൻ ഇൻ ചെയ്യുക.
