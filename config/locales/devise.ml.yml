      new:
        description: നിങ്ങളുടെ സ്ഥിരീകരണ ലിങ്ക് കാലഹരണപ്പെട്ടു അല്ലെങ്കിൽ അസാധുവാണ്.
          പുതിയൊരെണ്ണം അഭ്യർത്ഥിക്കുക.
        remember_password: നിങ്ങളുടെ പാസ്‌വേഡ് ഓർമ്മയുണ്ടോ?
        resend: സ്ഥിരീകരണ ഇമെയിൽ വീണ്ടും അയയ്ക്കുക
        sign_in: സൈൻ ഇൻ
        title: ഇമെയിൽ സ്ഥിരീകരണം ആവശ്യമാണ്
      send_instructions: നിങ്ങളുടെ ഇമെയിൽ വിലാസം സ്ഥിരീകരിക്കുന്നതിനുള്ള നിർദ്ദേശങ്ങളടങ്ങിയ
        ഒരു ഇമെയിൽ കുറച്ച് മിനിറ്റുകൾക്കുള്ളിൽ നിങ്ങൾക്ക് ലഭിക്കും.
      send_paranoid_instructions: നിങ്ങളുടെ ഇമെയിൽ വിലാസം ഞങ്ങളുടെ ഡാറ്റാബേസിൽ നിലവിലുണ്ടെങ്കിൽ,
        കുറച്ച് മിനിറ്റുകൾക്കുള്ളിൽ നിങ്ങളുടെ ഇമെയിൽ വിലാസം എങ്ങനെ സ്ഥിരീകരിക്കാമെന്നതിനുള്ള
        നിർദ്ദേശങ്ങളുള്ള ഒരു ഇമെയിൽ നിങ്ങൾക്ക് ലഭിക്കും.
    failure:
      already_authenticated: നിങ്ങൾ ഇതിനകം സൈൻ ഇൻ ചെയ്തിട്ടുണ്ട്.
      inactive: നിങ്ങളുടെ അക്കൗണ്ട് ഇതുവരെ സജീവമാക്കിയിട്ടില്ല.
      invalid: അസാധുവായ %{authentication_keys} അല്ലെങ്കിൽ പാസ്‌വേഡ്.
      last_attempt: നിങ്ങളുടെ അക്കൗണ്ട് ലോക്ക് ചെയ്യപ്പെടുന്നതിന് മുമ്പ് നിങ്ങൾക്ക്
        ഒരു ശ്രമം കൂടിയുണ്ട്.
      locked: നിങ്ങളുടെ അക്കൗണ്ട് ലോക്ക് ചെയ്തിരിക്കുന്നു.
      not_found_in_database: അസാധുവായ %{authentication_keys} അല്ലെങ്കിൽ പാസ്‌വേഡ്.
      timeout: നിങ്ങളുടെ സെഷൻ കാലഹരണപ്പെട്ടു. തുടരാൻ വീണ്ടും സൈൻ ഇൻ ചെയ്യുക.
      unauthenticated: തുടരുന്നതിന് മുമ്പ് നിങ്ങൾ സൈൻ ഇൻ ചെയ്യുകയോ സൈൻ അപ്പ് ചെയ്യുകയോ
        ചെയ്യേണ്ടതുണ്ട്.
      unconfirmed: തുടരുന്നതിന് മുമ്പ് നിങ്ങളുടെ ഇമെയിൽ വിലാസം സ്ഥിരീകരിക്കേണ്ടതുണ്ട്.
    mailer:
      confirmation_instructions:
        subject: സ്ഥിരീകരണ നിർദ്ദേശങ്ങൾ
      email_changed:
        subject: ഇമെയിൽ മാറ്റി
      password_change:
        subject: മിരു പാസ്‌വേഡ് പുനഃസജ്ജീകരണം വിജയകരമായി!
