name: Fly Staging Deployment
on:
  push:
    branches:
      - develop
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy app
        run: |
          if ! grep -Eq '^app *= *".+"' deployment/fly/fly.staging.toml; then
            echo "No Fly staging app configured in deployment/fly/fly.staging.toml; skipping deploy."
            exit 0
          fi

          flyctl deploy --config deployment/fly/fly.staging.toml --dockerfile deployment/fly/Dockerfile --remote-only
