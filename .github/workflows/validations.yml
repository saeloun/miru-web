name: CI Test Suite
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
    types: [labeled, opened, synchronize, reopened]
  workflow_dispatch:

# Cancel in-progress runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Running tests
    runs-on: ubuntu-latest  # Standard 2-core runner
    timeout-minutes: 45
    permissions:
      contents: read
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, 'skip ci')
    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_USER: root
      DB_PASS: password
      CI: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: miru_web_test
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U root -d miru_web_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true
          bundler: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            node_modules/.cache
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install pnpm packages
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true pnpm install --frozen-lockfile

      - name: Build Vite assets (sanity)
        env:
          SECRET_KEY_BASE: dummy
        run: |
          timeout 180 bin/vite build

      - name: Run Rubocop
        run: bundle exec rubocop

      - name: Run ESLint
        run: pnpm lint

      - name: Setup test database
        run: |
          bundle exec rake "parallel:create[2]" "parallel:load_schema[2]"

      - name: Run CLI request specs
        run: |
          bundle exec rspec spec/requests/api/v1/cli

      - name: Run parallel tests (excluding system specs)
        env:
          PARALLEL_TEST_PROCESSORS: 2  # Optimal for standard runners
        run: |
          mkdir -p tmp

          # Run specs with parallel_rspec, excluding system and system_skip specs
          bundle exec parallel_rspec spec -n 2 --exclude-pattern "spec/(system|system_skip)/"

          # Save failed specs list for debugging
          if [ -f tmp/failing_specs.txt ]; then
            echo "Failed specs:"
            cat tmp/failing_specs.txt
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            tmp/rspec_*.xml
            tmp/rspec*.xml
            tmp/capybara/*.png
            tmp/failing_specs.txt
            log/test.log
          if-no-files-found: warn

  system-specs:
    name: System specs (${{ matrix.shard_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, 'skip ci')
    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_USER: root
      DB_PASS: password
      CI: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_name: clients-projects
            spec_args: "spec/system/clients spec/system/projects"
          - shard_name: payments-settings
            spec_args: "spec/system/payments spec/system/settings"
          - shard_name: invoices
            spec_args: "spec/system/invoices"
          - shard_name: reports
            spec_args: "spec/system/reports"
          - shard_name: outstanding-overdue
            spec_args: "spec/system/outstanding_overdue_reports_spec.rb"
          - shard_name: teams-expenses
            spec_args: "spec/system/teams spec/system/expenses"
          - shard_name: time-tracking
            spec_args: "spec/system/time_tracking"
          - shard_name: users-profile
            spec_args: "spec/system/users spec/system/profile"
          - shard_name: misc-ui
            spec_args: "spec/system/basic_system_spec.rb spec/system/dashboard_spec.rb spec/system/navigation_spec.rb spec/system/holidays_management_spec.rb spec/system/employment_details spec/system/invoice_pdf_download_spec.rb spec/system/companies"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: miru_web_test
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U root -d miru_web_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true
          bundler: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache-system
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache-system.outputs.STORE_PATH }}
            node_modules/.cache
          key: ${{ runner.os }}-pnpm-system-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-system-
            ${{ runner.os }}-pnpm-

      - name: Install pnpm packages
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: |
          pnpm exec playwright install --with-deps chromium

      - name: Setup test database
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load

      - name: Run system specs pack
        env:
          PARALLEL_TEST_PROCESSORS: 2
          SYSTEM_SPECS_QUIET: 1
        run: |
          ./bin/system-specs-parallel ${{ matrix.spec_args }}

      - name: Upload system test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system-spec-results-${{ matrix.shard_name }}
          path: |
            tmp/capybara/*.png
            log/test.log
          if-no-files-found: warn

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true
          bundler: latest

      - name: Run bundler-audit
        run: |
          gem install bundler-audit --no-document
          bundler-audit check --update

      - name: Run brakeman
        run: |
          bundle exec brakeman -q -w2
