name: CI Test Suite
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
    types: [labeled, opened, synchronize, reopened]
  workflow_dispatch:

# Cancel in-progress runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Running tests
    runs-on: ubuntu-latest  # Standard 2-core runner
    timeout-minutes: 45
    permissions:
      contents: read
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, 'skip ci')
    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_USER: root
      DB_PASS: password
      CI: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: miru_web_test
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U root -d miru_web_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false
      
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            node_modules/.cache
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      
      - name: Install pnpm packages
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true pnpm install --frozen-lockfile
      
      - name: Build Vite assets (sanity)
        env:
          SECRET_KEY_BASE: dummy
        run: |
          timeout 180 bin/vite build
      
      - name: Run Rubocop
        run: bundle exec rubocop

      - name: Run ESLint
        run: pnpm lint
      
      - name: Setup test database
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load
          bundle exec rails db:migrate
          bundle exec rake parallel:create[2]
          bundle exec rake parallel:load_schema[2]
      
      - name: Enable PostgreSQL extensions
        run: |
          bundle exec rails runner "ActiveRecord::Base.connection.execute('CREATE EXTENSION IF NOT EXISTS pg_trgm')"
          bundle exec rails runner "ActiveRecord::Base.connection.execute('CREATE EXTENSION IF NOT EXISTS unaccent')"
      
      - name: Run parallel tests (excluding system specs)
        env:
          PARALLEL_TEST_PROCESSORS: 2  # Optimal for standard runners
        run: |
          mkdir -p tmp
          
          # Run specs with parallel_rspec in single container (uses available cores)
          bundle exec parallel_rspec spec \
            --exclude-pattern "spec/system" \
            -n 2 \
            -o "--format progress --format RspecJunitFormatter --out tmp/rspec.xml --tag ~type:system"
          
          # Save failed specs list for debugging
          if [ -f tmp/failing_specs.txt ]; then
            echo "Failed specs:"
            cat tmp/failing_specs.txt
          fi
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            tmp/rspec_*.xml
            tmp/rspec*.xml
            tmp/capybara/*.png
            tmp/failing_specs.txt
            log/test.log
          if-no-files-found: warn

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true
      
      - name: Run bundler-audit
        run: |
          gem install bundler-audit --no-document
          bundler-audit check --update
      
      - name: Run brakeman
        run: |
          bundle exec brakeman -q -w2
